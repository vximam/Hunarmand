<style>
/* ── INHERITED COLOR VARIABLES FROM DESIGN SYSTEM ── */
:root {
  --g1: #1b5e37;
  --g2: #134228;
  --mint: #e8f5ed;
  --mint2: #d4ecde;
  --white: #ffffff;
  --near: #f5fbf7;
  --ink: #0b1a10;
  --muted: #4e6a57;
  --faint: #8ca898;
  --bdr: rgba(197, 222, 206, 0.55);
  --bdr2: rgba(197, 222, 206, 0.25);
  --sh1: 0 2px 8px rgba(11, 26, 16, 0.04);
  --sh2: 0 4px 16px rgba(11, 26, 16, 0.06);
  --fd: 'Sora', sans-serif;
  --fi: 'Inter', sans-serif;
  --transition: all 0.2s ease-in-out;
}

[data-theme="dark"] {
  --white: #121c15;
  --near: #0a110c;
  --ink: #e8f5ed;
  --muted: #7ba888;
  --faint: #4e6a57;
  --bdr: rgba(197, 222, 206, 0.15);
  --bdr2: rgba(197, 222, 206, 0.08);
  --mint: #1c3526;
  --mint2: #234430;
}

/* ── BASE RESET ── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--fi);
  color: var(--ink);
  background: var(--near);
  padding: 2.5rem 2rem;
  min-height: 100vh;
  transition: background 0.3s, color 0.3s;
}

/* ── CONTAINER ── */
.workspace-container {
  max-width: 1100px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 1.2rem;
}

/* ── BREADCRUMB COMPONENT (TOP LEFT) ── */
.breadcrumb-nav {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  font-size: 0.78rem;
  color: var(--muted);
  font-weight: 500;
}
.breadcrumb-link {
  color: var(--muted);
  text-decoration: none;
  transition: var(--transition);
}
.breadcrumb-link:hover {
  color: var(--g1);
}
.breadcrumb-slash {
  color: var(--faint);
  font-weight: 400;
}
.breadcrumb-current {
  color: var(--g1);
  font-weight: 600;
}

/* ── ACTION HEADER BAR ── */
.header-action-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 0.2rem;
}
.heading-primary {
  font-family: var(--fd);
  font-size: 1.6rem;
  font-weight: 700;
  color: var(--ink);
}
.view-all-action {
  color: var(--g1);
  font-weight: 700;
  font-size: 0.85rem;
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: var(--transition);
}
.view-all-action:hover {
  color: var(--g2);
  transform: translateX(2px);
}

/* ── PILL FILTER CAROUSEL (Image Matched) ── */
.filter-pills-row {
  display: flex;
  gap: 0.6rem;
  flex-wrap: wrap;
  margin-bottom: 0.5rem;
}
.pill-button {
  font-family: var(--fi);
  font-size: 0.82rem;
  font-weight: 500;
  padding: 0.45rem 1.2rem;
  border-radius: 100px;
  border: 1px solid var(--bdr);
  background: var(--white);
  color: var(--muted);
  cursor: pointer;
  transition: var(--transition);
}
.pill-button:hover {
  border-color: var(--g1);
  background: var(--near);
  color: var(--g1);
}
.pill-button.active {
  background: var(--g1);
  color: var(--white);
  border-color: var(--g1);
  font-weight: 600;
}

/* ── WORKER COMPONENT DATA MATRIX (Image Matched Cards) ── */
.matrix-grid-wrapper {
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
}
.worker-record-card {
  background: var(--white);
  border: 1px solid var(--bdr2);
  border-radius: 14px;
  padding: 1rem 1.25rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: var(--sh1);
  transition: var(--transition);
}
.worker-record-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--sh2);
  border-color: var(--bdr);
}

/* Profile Left Block */
.profile-core-block {
  display: flex;
  align-items: center;
  gap: 1rem;
}
.profile-avatar {
  width: 52px;
  height: 52px;
  border-radius: 12px;
  object-fit: cover;
  background: var(--mint);
  border: 1px solid var(--bdr2);
}
.profile-info-stack {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.profile-name {
  font-family: var(--fd);
  font-size: 0.98rem;
  font-weight: 700;
  color: var(--ink);
}
.profile-meta-metrics {
  font-size: 0.78rem;
  color: var(--muted);
}
.divider-span {
  color: var(--faint);
  margin: 0 4px;
}

/* Action Right Checkbox Box */
.approve-action-trigger {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  background: var(--mint);
  border: 1px solid var(--mint2);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--g1);
  font-size: 0.85rem;
  cursor: pointer;
  transition: var(--transition);
}
.approve-action-trigger:hover {
  background: var(--g1);
  color: var(--white);
  border-color: var(--g1);
  transform: scale(1.05);
}

/* Utility Utilities */
.theme-switch-widget {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 40px;
  height: 40px;
  background: var(--white);
  border: 1px solid var(--bdr);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  box-shadow: var(--sh2);
  color: var(--g1);
  z-index: 1000;
}

// Instantly construct component list upon load
document.addEventListener("DOMContentLoaded", () => {
  const container = document.getElementById("matrixGridContainer");
  
  workerPoolData.forEach((worker, index) => {
    const card = document.createElement("div");
    card.className = "worker-record-card";
    card.setAttribute("data-trade-type", worker.trade);
    card.id = `worker-row-${index}`;
    
    card.innerHTML = `
      <div class="profile-core-block">
        <img src="${worker.img}" class="profile-avatar" alt="${worker.name}">
        <div class="profile-info-stack">
          <div class="profile-name">${worker.name}</div>
          <div class="profile-meta-metrics">
            ${worker.trade}<span class="divider-span">|</span>${worker.reviews} reviews
          </div>
        </div>
      </div>
      <div class="approve-action-trigger" onclick="approveWorkerFromMatrix('worker-row-${index}')" title="Approve Identity">
        <i class="fa-solid fa-check"></i>
      </div>
    `;
    
    container.appendChild(card);
  });
});

// Interactive dynamic filtration control matching standard pill designs
function applyMatrixFilter(category, buttonElement) {
  document.querySelectorAll('.pill-button').forEach(btn => btn.classList.remove('active'));
  buttonElement.classList.add('active');
  
  const allCards = document.querySelectorAll('.worker-record-card');
  allCards.forEach(card => {
    const cardTrade = card.getAttribute('data-trade-type');
    if (category === 'all' || cardTrade === category) {
      card.style.display = 'flex';
    } else {
      card.style.display = 'none';
    }
  });
}

// Action Trigger Mechanism for approvals
function approveWorkerFromMatrix(rowId) {
  const targetElement = document.getElementById(rowId);
  if(targetElement) {
    targetElement.style.opacity = '0';
    targetElement.style.transform = 'scale(0.97)';
    setTimeout(() => {
      targetElement.remove();
    }, 200);
  }
}

// Interface Light/Dark control mechanism
function toggleInterfaceTheme() {
  const root = document.documentElement;
  const targetTheme = root.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  root.setAttribute('data-theme', targetTheme);
  document.getElementById('themeWidgetIcon').className = targetTheme === 'dark' ? 'fa-solid fa-sun' : 'fa-solid fa-moon';
}
</script>
