<!DOCTYPE html>
<html lang="en">
<head>
<script src="auth.js"></script>
<script>checkAdminSession();</script>
<script>!function(){var t=localStorage.getItem('hun_theme')||'light';document.documentElement.setAttribute('data-theme',t);}();</script>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Users — Hunarmand Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link rel="stylesheet" href="admin-core.css">
<style>.tab-strip{display:flex;gap:.25rem;padding:.55rem 1.4rem 0;border-bottom:1px solid var(--bdr2);overflow-x:auto}</style>
</head>
<body>
<div class="shell">
  <div id="hc-sidebar-slot"></div>
  <div class="main-content">
    <div id="hc-topbar-slot"></div>
    <div class="page-body">

      <div class="qa-bar fu">
        <span class="qa-lbl">Users</span>
        <button class="qa-btn primary" onclick="openAddUser()"><i class="fas fa-user-plus"></i> Add User</button>
        <div class="qa-div"></div>
        <button class="qa-btn" onclick="exportCSV()"><i class="fas fa-download"></i> Export CSV</button>
        <button class="qa-btn" onclick="bulkAction()"><i class="fas fa-users-gear"></i> Bulk Actions</button>
        <div class="qa-div"></div>
        <button class="qa-btn amber" onclick="broadcastUsers()"><i class="fas fa-bullhorn"></i> Message Users</button>
      </div>

      <div class="stats-grid fu">
        <div class="stat-card"><div class="stat-hdr"><div class="stat-ico"><i class="fas fa-users"></i></div><span class="stat-chip">Total</span></div><p class="stat-lbl">All Users</p><p class="stat-val" id="sc-total">0</p></div>
        <div class="stat-card"><div class="stat-hdr"><div class="stat-ico"><i class="fas fa-circle-check"></i></div><span class="stat-chip">Active</span></div><p class="stat-lbl">Active Accounts</p><p class="stat-val" id="sc-act">0</p></div>
        <div class="stat-card"><div class="stat-hdr"><div class="stat-ico" style="background:var(--amber-bg);color:var(--amber)"><i class="fas fa-clock"></i></div><span class="stat-chip warn">Waiting</span></div><p class="stat-lbl">Pending</p><p class="stat-val" id="sc-pend">0</p></div>
        <div class="stat-card"><div class="stat-hdr"><div class="stat-ico" style="background:var(--red-bg);color:var(--red)"><i class="fas fa-ban"></i></div><span class="stat-chip bad">Blocked</span></div><p class="stat-lbl">Blocked</p><p class="stat-val" id="sc-blk">0</p></div>
        <div class="stat-card"><div class="stat-hdr"><div class="stat-ico" style="background:var(--blue-bg);color:var(--blue)"><i class="fas fa-bag-shopping"></i></div><span class="stat-chip blue">Avg</span></div><p class="stat-lbl">Avg Orders/User</p><p class="stat-val" id="sc-avg">—</p></div>
      </div>

      <div class="tbl-card fu">
        <div class="tbl-top">
          <div class="tbl-title-blk"><div class="tbl-title">User Registry</div><div class="tbl-sub" id="uCount">Loading...</div></div>
          <div class="tbl-actions">
            <div class="search-mini"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input type="text" id="uSearch" placeholder="Search users..." oninput="renderTable()"></div>
            <select class="tbl-sel" id="cityF" onchange="renderTable()"><option value="">All Cities</option><option>Karachi</option><option>Lahore</option><option>Islamabad</option><option>Faisalabad</option><option>Rawalpindi</option><option>Peshawar</option></select>
            <select class="tbl-sel" id="statusF" onchange="renderTable()"><option value="">All Status</option><option value="active">Active</option><option value="pending">Pending</option><option value="inactive">Inactive</option><option value="blocked">Blocked</option></select>
          </div>
        </div>
        <div class="tab-strip" id="uTabs">
          <button class="ftab active" onclick="setTab('all',this)">All Users</button>
          <button class="ftab" onclick="setTab('active',this)">✓ Active</button>
          <button class="ftab" onclick="setTab('pending',this)">⏳ Pending</button>
          <button class="ftab" onclick="setTab('blocked',this)">🚫 Blocked</button>
        </div>
        <div class="tbl-scroll">
          <table class="dt">
            <thead><tr>
              <th style="width:36px"><input type="checkbox" id="selAll" onchange="toggleAll(this)" style="accent-color:var(--g1)"></th>
              <th>User</th><th>Email</th><th>City</th><th>Phone</th><th>Orders</th><th>Joined</th><th>Status</th><th>Actions</th>
            </tr></thead>
            <tbody id="uBody"></tbody>
          </table>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;padding:.8rem 1.4rem;border-top:1px solid var(--bdr2);flex-wrap:wrap;gap:.5rem">
          <span class="pg-info" id="pgInfo">–</span>
          <div class="pg-btns" id="pgBtns"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- DRAWER -->
<div class="drawer-overlay" id="dOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="uDrawer">
  <div class="drawer-hdr">
    <div class="drawer-ttl" id="dTitle">User Profile</div>
    <button class="drawer-x" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-body" id="dBody"></div>
  <div class="drawer-ftr">
    <button class="btn-primary" style="flex:1" onclick="drawerEdit()"><i class="fas fa-pen"></i> Edit User</button>
    <button class="btn-red" id="dBlkBtn" onclick="drawerBlock()"><i class="fas fa-ban"></i> Block</button>
    <button class="btn-outline" onclick="drawerMsg()"><i class="fas fa-comment"></i></button>
  </div>
</div>

<script src="admin-core.js"></script>
<script src="portal-shared.js"></script>
<script>
HC.init('Users','Manage Users','users');

function getAdminUsers() {
  const all = JSON.parse(localStorage.getItem('allUsers') || '[]');
  return all.map(u => {
    return {
      id: u.id,
      name: u.name,
      email: u.email || '',
      city: u.city || '—',
      phone: u.phone || '—',
      joined: u.joined || 'Jan 2026',
      orders: u.requests || 0,
      status: u.status || 'active',
      blocked: u.status === 'blocked',
      gender: u.gender || 'male',
      type: u.role === 'admin' ? 'Admin' : 'Regular'
    };
  });
}

function persistUserStatus(id, status) {
  const all = JSON.parse(localStorage.getItem('allUsers') || '[]');
  const u = all.find(x => x.id === id);
  if (u) {
    u.status = status;
    localStorage.setItem('allUsers', JSON.stringify(all));
  }
}

function persistUserEdit(id, name, city, phone) {
  const all = JSON.parse(localStorage.getItem('allUsers') || '[]');
  const u = all.find(x => x.id === id);
  if (u) {
    u.name = name;
    u.city = city;
    u.phone = phone;
    localStorage.setItem('allUsers', JSON.stringify(all));
  }
}

function deleteUserFromStorage(id) {
  const all = JSON.parse(localStorage.getItem('allUsers') || '[]');
  const filtered = all.filter(x => x.id !== id);
  localStorage.setItem('allUsers', JSON.stringify(filtered));
}

function addUserToStorage(u) {
  const all = JSON.parse(localStorage.getItem('allUsers') || '[]');
  all.unshift(u);
  localStorage.setItem('allUsers', JSON.stringify(all));
}

let activeTab='all',page=1;const PER=8;
let selUser=null;
let users = [];
const avCls=['av0','av1','av2','av3','av4','av5'];
const ini=n=>(n||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();

function initStats(){
  users = getAdminUsers();
  HC.countUp(document.getElementById('sc-total'),users.length);
  HC.countUp(document.getElementById('sc-act'),users.filter(u=>u.status==='active'&&!u.blocked).length);
  HC.countUp(document.getElementById('sc-pend'),users.filter(u=>u.status==='pending').length);
  HC.countUp(document.getElementById('sc-blk'),users.filter(u=>u.blocked).length);
  const avg=users.length?(users.reduce((s,u)=>s+u.orders,0)/users.length).toFixed(1):'0';
  setTimeout(()=>document.getElementById('sc-avg').textContent=avg,600);
}

function getFiltered(){
  const q=(document.getElementById('uSearch').value||'').toLowerCase();
  const city=document.getElementById('cityF').value;
  const st=document.getElementById('statusF').value;
  return users.filter(u=>{
    if(activeTab==='blocked'&&!u.blocked)return false;
    if(activeTab!=='all'&&activeTab!=='blocked'&&u.status!==activeTab)return false;
    if(city&&u.city!==city)return false;
    if(st){if(st==='blocked'&&!u.blocked)return false;if(st!=='blocked'&&u.status!==st)return false;}
    if(q&&!u.name.toLowerCase().includes(q)&&!u.email.toLowerCase().includes(q)&&!u.city.toLowerCase().includes(q))return false;
    return true;
  });
}

function renderTable(){
  users = getAdminUsers();
  const data=getFiltered();
  const total=data.length;
  const pages=Math.max(1,Math.ceil(total/PER));
  if(page>pages)page=pages;
  const start=(page-1)*PER;
  const slice=data.slice(start,start+PER);
  document.getElementById('uCount').textContent=`${total} user${total!==1?'s':''} found`;
  document.getElementById('pgInfo').textContent=`Showing ${total?start+1:0}–${Math.min(start+PER,total)} of ${total}`;

  document.getElementById('uBody').innerHTML=slice.map((u,i)=>{
    const st=u.blocked?'blocked':u.status;
    const stLbl={active:'✓ Active',pending:'⏳ Pending',inactive:'Inactive',blocked:'🚫 Blocked'}[st]||st;
    return`<tr onclick="openDrawer(${u.id})" style="animation:rowIn .3s var(--e2) ${i*.04}s both">
      <td onclick="event.stopPropagation()"><input type="checkbox" class="rc" data-id="${u.id}" style="accent-color:var(--g1)"></td>
      <td><div style="display:flex;align-items:center;gap:.62rem">
        <div class="tbl-av-init ${avCls[u.id%6]}">${ini(u.name)}</div>
        <div><div style="font-weight:700;color:var(--ink);font-size:.82rem">${u.name}</div><div style="font-size:.64rem;color:var(--faint);font-family:var(--fi)">${u.type}</div></div>
      </div></td>
      <td style="color:var(--body);font-size:.79rem">${u.email}</td>
      <td style="color:var(--body)"><i class="fas fa-location-dot" style="color:var(--g3);font-size:.62rem;margin-right:.28rem"></i>${u.city}</td>
      <td style="color:var(--body);font-size:.76rem;font-family:var(--fi)">${u.phone}</td>
      <td style="text-align:center;font-weight:700">${u.orders}</td>
      <td style="color:var(--faint);font-size:.76rem;font-family:var(--fi)">${u.joined}</td>
      <td><span class="badge ${st}">${stLbl}</span></td>
      <td><div style="display:flex;gap:.3rem;justify-content:center" onclick="event.stopPropagation()">
        <button class="act-btn view" title="View" onclick="openDrawer(${u.id})"><i class="fas fa-eye"></i></button>
        <button class="act-btn warn" title="${u.blocked?'Unblock':'Block'}" onclick="quickBlock(${u.id})"><i class="fas fa-${u.blocked?'unlock':'ban'}"></i></button>
        <button class="act-btn del" title="Delete" onclick="quickDelete(${u.id},'${u.name}')"><i class="fas fa-trash"></i></button>
      </div></td>
    </tr>`;
  }).join('')||`<tr><td colspan="9" style="text-align:center;padding:2.5rem;color:var(--faint);font-family:var(--fi)">No users match your filters.</td></tr>`;

  let pg=`<button class="pg-btn" onclick="goPage(${page-1})" ${page<=1?'disabled':''}>‹</button>`;
  for(let i=1;i<=pages;i++){
    if(i===1||i===pages||Math.abs(i-page)<=1)pg+=`<button class="pg-btn ${i===page?'active':''}" onclick="goPage(${i})">${i}</button>`;
    else if(Math.abs(i-page)===2)pg+=`<span style="color:var(--faint);line-height:27px;font-size:.8rem">…</span>`;
  }
  pg+=`<button class="pg-btn" onclick="goPage(${page+1})" ${page>=pages?'disabled':''}>›</button>`;
  document.getElementById('pgBtns').innerHTML=pg;
  
  HC.applyGlobalSettings();
}
function goPage(p){page=p;renderTable();}
function setTab(t,el){document.querySelectorAll('#uTabs .ftab').forEach(b=>b.classList.remove('active'));el.classList.add('active');activeTab=t;page=1;renderTable();}
function toggleAll(el){document.querySelectorAll('.rc').forEach(cb=>cb.checked=el.checked);}

function quickBlock(id){const u=users.find(x=>x.id===id);if(!u)return;u.blocked=!u.blocked;u.status=u.blocked?'blocked':'active';persistUserStatus(id, u.status);renderTable();initStats();HC.toast(`${u.name} ${u.blocked?'blocked':'unblocked'}.`,u.blocked?'warning':'success');}
function quickDelete(id,name){openModal({icon:'fas fa-trash',iconType:'danger',title:'Delete User',body:`Permanently delete ${name}?`,confirmText:'Delete',danger:true,onConfirm:()=>{const i=users.findIndex(x=>x.id===id);if(i>-1)users.splice(i,1);deleteUserFromStorage(id);renderTable();initStats();HC.toast(`${name} deleted.`,'warning');}});}

function openDrawer(id){
  selUser=users.find(u=>u.id===id);if(!selUser)return;
  const u=selUser;
  const st=u.blocked?'blocked':u.status;
  const stLbl={active:'✓ Active',pending:'⏳ Pending',inactive:'Inactive',blocked:'🚫 Blocked'}[st]||st;
  document.getElementById('dTitle').textContent=u.name;
  document.getElementById('dBlkBtn').textContent=u.blocked?'✓ Unblock':'🚫 Block';
  document.getElementById('dBody').innerHTML=`
    <div style="background:linear-gradient(135deg,var(--g1),var(--g2));border-radius:13px;padding:1.1rem;color:#fff;margin-bottom:1rem;display:flex;align-items:center;gap:.9rem">
      <div style="width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.9rem;font-weight:700;color:#fff;background:rgba(255,255,255,.25);flex-shrink:0">${ini(u.name)}</div>
      <div>
        <div style="font-family:var(--fd);font-size:1.05rem;font-weight:800">${u.name}</div>
        <div style="font-size:.73rem;opacity:.75;margin-top:.1rem">${u.type} · ${u.city}</div>
        <span style="display:inline-block;margin-top:.38rem;background:rgba(255,255,255,.2);padding:.1rem .48rem;border-radius:100px;font-size:.63rem;font-weight:700">${stLbl}</span>
      </div>
    </div>
    <div class="dr-sec-ttl" style="margin-bottom:.55rem">Account Details</div>
    <div class="dr-info-grid">
      <div class="dr-info"><div class="dr-info-lbl">Email</div><div class="dr-info-val" style="font-size:.7rem">${u.email}</div></div>
      <div class="dr-info"><div class="dr-info-lbl">Phone</div><div class="dr-info-val" style="font-size:.7rem">${u.phone}</div></div>
      <div class="dr-info"><div class="dr-info-lbl">City</div><div class="dr-info-val">${u.city}</div></div>
      <div class="dr-info"><div class="dr-info-lbl">Gender</div><div class="dr-info-val">${u.gender}</div></div>
      <div class="dr-info"><div class="dr-info-lbl">Joined</div><div class="dr-info-val">${u.joined}</div></div>
      <div class="dr-info"><div class="dr-info-lbl">Account Type</div><div class="dr-info-val">${u.type}</div></div>
    </div>
    <div class="dr-sec-ttl" style="margin:1rem 0 .5rem">Order History</div>
    <div style="background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:.9rem;text-align:center">
      <div style="font-family:var(--fd);font-size:2rem;font-weight:800;color:var(--g1)">${u.orders}</div>
      <div style="font-size:.72rem;color:var(--faint);font-family:var(--fi)">Total orders placed</div>
      ${u.orders>0?'<div style="font-size:.7rem;color:var(--muted);font-family:var(--fi);margin-top:.35rem">Last order: 3 days ago</div>':'<div style="font-size:.7rem;color:var(--faint);font-family:var(--fi);margin-top:.35rem">No orders yet</div>'}
    </div>`;
  document.getElementById('dOverlay').classList.add('show');
  document.getElementById('uDrawer').classList.add('open');
  document.body.style.overflow='hidden';
  
  HC.applyGlobalSettings();
}
function closeDrawer(){document.getElementById('dOverlay').classList.remove('show');document.getElementById('uDrawer').classList.remove('open');document.body.style.overflow='';selUser=null;}
function drawerBlock(){if(!selUser)return;const u=selUser;u.blocked=!u.blocked;u.status=u.blocked?'blocked':'active';persistUserStatus(u.id, u.status);closeDrawer();renderTable();initStats();HC.toast(`${u.name} ${u.blocked?'blocked':'unblocked'}.`,u.blocked?'warning':'success');}
function drawerEdit(){if(!selUser)return;const u=selUser;openModal({icon:'fas fa-pen',title:'Edit User',body:`Editing profile for ${u.name}.`,formHTML:`<div class="modal-form"><div class="mf-row"><div class="mf-field"><label class="mf-lbl">Full Name</label><input class="mf-input" id="euN" value="${u.name}"></div><div class="mf-field"><label class="mf-lbl">City</label><input class="mf-input" id="euC" value="${u.city}"></div></div><div class="mf-field"><label class="mf-lbl">Phone</label><input class="mf-input" id="euP" value="${u.phone}"></div></div>`,confirmText:'Save',onConfirm:()=>{u.name=document.getElementById('euN')?.value||u.name;u.city=document.getElementById('euC')?.value||u.city;u.phone=document.getElementById('euP')?.value||u.phone;persistUserEdit(u.id, u.name, u.city, u.phone);closeDrawer();renderTable();HC.toast('User updated.','success');}});}
function drawerMsg(){if(!selUser)return;openModal({icon:'fas fa-comment',title:'Message User',body:`Send a message to ${selUser.name}.`,formHTML:`<div class="modal-form"><div class="mf-field"><label class="mf-lbl">Message</label><textarea class="mf-input mf-ta" placeholder="Type your message..."></textarea></div></div>`,confirmText:'Send',onConfirm:()=>HC.toast(`Message sent to ${selUser.name}.`,'success')});}

function openAddUser(){openModal({icon:'fas fa-user-plus',title:'Add New User',body:'Register a new client account.',wide:true,formHTML:`<div class="modal-form"><div class="mf-row"><div class="mf-field"><label class="mf-lbl">Full Name</label><input class="mf-input" id="uN" placeholder="Full name"></div><div class="mf-field"><label class="mf-lbl">Email</label><input class="mf-input" type="email" id="uE" placeholder="user@email.com"></div></div><div class="mf-row"><div class="mf-field"><label class="mf-lbl">Phone</label><input class="mf-input" id="uP" placeholder="+92 3XX XXXXXXX"></div><div class="mf-field"><label class="mf-lbl">City</label><input class="mf-input" id="uC" placeholder="Karachi"></div></div><div class="mf-row"><div class="mf-field"><label class="mf-lbl">Account Type</label><select class="mf-sel" id="uT"><option>Regular</option><option>Business</option><option>Corporate</option></select></div><div class="mf-field"><label class="mf-lbl">Gender</label><select class="mf-sel" id="uG"><option>Male</option><option>Female</option></select></div></div></div>`,confirmText:'Create Account',onConfirm:()=>{const n=document.getElementById('uN')?.value.trim();if(!n){HC.toast('Name required','warning');return;}const newU = {id:Date.now(),name:n,email:document.getElementById('uE')?.value||'',city:document.getElementById('uC')?.value||'',phone:document.getElementById('uP')?.value||'',joined:'Jun 2026',requests:0,status:'active',blocked:false,gender:document.getElementById('uG')?.value||'Male',role:'user'};addUserToStorage(newU);renderTable();initStats();HC.toast(`✓ Account created for "${n}".`,'success');}});}
function bulkAction(){openModal({icon:'fas fa-users-gear',title:'Bulk Actions',body:'Apply an action to all selected users.',formHTML:`<div class="modal-form"><div class="mf-field"><label class="mf-lbl">Action</label><select class="mf-sel"><option>Send Notification</option><option>Block Selected</option><option>Export Selected</option></select></div></div>`,confirmText:'Apply',onConfirm:()=>HC.toast('Bulk action applied.','success')});}
function broadcastUsers(){openModal({icon:'fas fa-bullhorn',iconType:'amber',title:'Message All Users',body:'Send a platform notification to all users.',formHTML:`<div class="modal-form"><div class="mf-field"><label class="mf-lbl">Title</label><input class="mf-input" id="bT" placeholder="Platform Update"></div><div class="mf-field"><label class="mf-lbl">Message</label><textarea class="mf-input mf-ta" id="bM" placeholder="Message body..."></textarea></div></div>`,confirmText:'Send',onConfirm:()=>{const t=document.getElementById('bT')?.value.trim();if(!t){HC.toast('Title required','warning');return;}HC.toast(`📢 Broadcast sent to all users.`,'success');}});}
function exportCSV(){HC.exportCSV([['Name','Email','City','Phone','Orders','Joined','Status'],...users.map(u=>[u.name,u.email,u.city,u.phone,u.orders,u.joined,u.blocked?'Blocked':u.status])],'hunarmand_users.csv');}

document.addEventListener('DOMContentLoaded',()=>{renderTable();setTimeout(initStats,300);});
</script>
</body>
</html>
