<!DOCTYPE html>
<html lang="en">
<head>
<script src="auth.js"></script>
<script>checkAdminSession();</script>
<script>!function(){var t=localStorage.getItem('hun_theme')||'light';document.documentElement.setAttribute('data-theme',t);}();</script>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Workers — Hunarmand Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Sora:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<link rel="stylesheet" href="admin-core.css">
<style>
.stars{color:var(--amber);font-size:.65rem;letter-spacing:1px}
.tab-strip{display:flex;gap:.25rem;padding:.55rem 1.4rem 0;border-bottom:1px solid var(--bdr2);overflow-x:auto}
</style>
</head>
<body>
<div class="shell">
  <div id="hc-sidebar-slot"></div>
  <div class="main-content">
    <div id="hc-topbar-slot"></div>
    <div class="page-body">

      <div class="qa-bar fu">
        <span class="qa-lbl">Workers</span>
        <button class="qa-btn primary" onclick="openAddWorker()"><i class="fas fa-plus"></i> Add Worker</button>
        <button class="qa-btn success" onclick="location.href='pending-approvals.html'"><i class="fas fa-user-clock"></i> Pending <span style="background:var(--red);color:#fff;font-size:.58rem;padding:.05rem .3rem;border-radius:100px;margin-left:.18rem">18</span></button>
        <div class="qa-div"></div>
        <button class="qa-btn" onclick="exportCSV()"><i class="fas fa-download"></i> Export CSV</button>
        <button class="qa-btn" onclick="bulkVerify()"><i class="fas fa-shield-check"></i> Bulk Verify</button>
        <div class="qa-div"></div>
        <button class="qa-btn amber" onclick="broadcastWorkers()"><i class="fas fa-bullhorn"></i> Message Workers</button>
      </div>

      <div class="stats-grid fu">
        <div class="stat-card"><div class="stat-hdr"><div class="stat-ico"><i class="fas fa-users"></i></div><span class="stat-chip">Total</span></div><p class="stat-lbl">All Workers</p><p class="stat-val" id="sc-total">0</p></div>
        <div class="stat-card"><div class="stat-hdr"><div class="stat-ico"><i class="fas fa-circle-check"></i></div><span class="stat-chip">Active</span></div><p class="stat-lbl">Verified</p><p class="stat-val" id="sc-ver">0</p></div>
        <div class="stat-card"><div class="stat-hdr"><div class="stat-ico" style="background:var(--amber-bg);color:var(--amber)"><i class="fas fa-clock"></i></div><span class="stat-chip warn">Action</span></div><p class="stat-lbl">Pending Approval</p><p class="stat-val" id="sc-pend">0</p></div>
        <div class="stat-card"><div class="stat-hdr"><div class="stat-ico" style="background:var(--red-bg);color:var(--red)"><i class="fas fa-ban"></i></div><span class="stat-chip bad">Flagged</span></div><p class="stat-lbl">Suspended</p><p class="stat-val" id="sc-susp">0</p></div>
        <div class="stat-card"><div class="stat-hdr"><div class="stat-ico" style="background:var(--blue-bg);color:var(--blue)"><i class="fas fa-star"></i></div><span class="stat-chip blue">Avg</span></div><p class="stat-lbl">Avg Rating</p><p class="stat-val" id="sc-rate">—</p></div>
      </div>

      <div class="tbl-card fu">
        <div class="tbl-top">
          <div class="tbl-title-blk"><div class="tbl-title">Worker Registry</div><div class="tbl-sub" id="wCount">Loading...</div></div>
          <div class="tbl-actions">
            <div class="search-mini"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><input type="text" id="wSearch" placeholder="Search workers..." oninput="renderTable()"></div>
            <select class="tbl-sel" id="tradeF" onchange="renderTable()"><option value="">All Trades</option><option>Electrician</option><option>Plumber</option><option>Carpenter</option><option>Painter</option><option>AC Technician</option><option>Welder</option><option>Tailor</option><option>Housecleaner</option><option>Mason</option></select>
            <select class="tbl-sel" id="statusF" onchange="renderTable()"><option value="">All Status</option><option value="verified">Verified</option><option value="pending">Pending</option><option value="suspended">Suspended</option></select>
          </div>
        </div>
        <div class="tab-strip" id="statusTabs">
          <button class="ftab active" onclick="setTab('all',this)">All Workers</button>
          <button class="ftab" onclick="setTab('verified',this)">✓ Verified</button>
          <button class="ftab" onclick="setTab('pending',this)">⏳ Pending</button>
          <button class="ftab" onclick="setTab('suspended',this)">🚫 Suspended</button>
        </div>
        <div class="tbl-scroll">
          <table class="dt">
            <thead><tr>
              <th style="width:36px"><input type="checkbox" id="selAll" onchange="toggleAll(this)" style="accent-color:var(--g1)"></th>
              <th>Worker</th><th>Trade</th><th>City</th><th>Rating</th><th>Orders</th><th>Status</th><th>Joined</th><th>Actions</th>
            </tr></thead>
            <tbody id="wBody"></tbody>
          </table>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;padding:.8rem 1.4rem;border-top:1px solid var(--bdr2);flex-wrap:wrap;gap:.5rem">
          <span class="pg-info" id="pgInfo">–</span>
          <div class="pg-btns" id="pgBtns"></div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- DRAWER -->
<div class="drawer-overlay" id="dOverlay" onclick="closeDrawer()"></div>
<div class="drawer" id="wDrawer">
  <div class="drawer-hdr">
    <div class="drawer-ttl" id="dTitle">Worker Profile</div>
    <button class="drawer-x" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-body" id="dBody"></div>
  <div class="drawer-ftr">
    <button class="btn-primary" style="flex:1" id="dApprBtn" onclick="drawerApprove()"><i class="fas fa-check"></i> Approve</button>
    <button class="btn-red" id="dSuspBtn" onclick="drawerSuspend()"><i class="fas fa-ban"></i> Suspend</button>
    <button class="btn-outline" onclick="drawerMsg()"><i class="fas fa-comment"></i></button>
  </div>
</div>

<script src="admin-core.js"></script>
<script src="portal-shared.js"></script>
<script>
HC.init('Workers','Worker Registry','workers');

const workers=[
  {id:1,name:'Tariq Mahmood',trade:'Plumber',city:'Karachi',rating:0,orders:0,status:'pending',joined:'Jan 2026',cnic:'42101-1234567-1',phone:'+92 321 111 0001',age:32,img:'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=80&h=80&fit=crop'},
  {id:2,name:'Ayesha Khan',trade:'Housecleaner',city:'Lahore',rating:4.8,orders:47,status:'verified',joined:'Oct 2025',cnic:'35201-2345678-2',phone:'+92 300 222 0002',age:27,img:'https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=80&h=80&fit=crop'},
  {id:3,name:'Usman Ali',trade:'Carpenter',city:'Islamabad',rating:4.5,orders:83,status:'verified',joined:'Aug 2025',cnic:'61101-3456789-3',phone:'+92 333 333 0003',age:38,img:'https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=80&h=80&fit=crop'},
  {id:4,name:'Muhammad Rizwan',trade:'Electrician',city:'Faisalabad',rating:4.2,orders:112,status:'verified',joined:'Jul 2025',cnic:'33102-4567890-4',phone:'+92 345 444 0004',age:29,img:'https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=80&h=80&fit=crop'},
  {id:5,name:'Zainab Bibi',trade:'Housecleaner',city:'Peshawar',rating:4.9,orders:61,status:'verified',joined:'Sep 2025',cnic:'17301-5678901-5',phone:'+92 315 555 0005',age:24,img:'https://images.unsplash.com/photo-1580489944761-15a19d654956?w=80&h=80&fit=crop'},
  {id:6,name:'Bilal Ahmed',trade:'Carpenter',city:'Lahore',rating:0,orders:0,status:'pending',joined:'Feb 2026',cnic:'35202-6789012-6',phone:'+92 322 666 0006',age:31,img:'https://images.unsplash.com/photo-1519085360753-af0119f7cbe7?w=80&h=80&fit=crop'},
  {id:7,name:'Kamran Shah',trade:'Plumber',city:'Karachi',rating:3.8,orders:24,status:'suspended',joined:'May 2025',cnic:'42201-7890123-7',phone:'+92 311 777 0007',age:44,img:'https://images.unsplash.com/photo-1560250097-0b93528c311a?w=80&h=80&fit=crop'},
  {id:8,name:'Sana Malik',trade:'Housecleaner',city:'Rawalpindi',rating:4.7,orders:38,status:'verified',joined:'Nov 2025',cnic:'37501-8901234-8',phone:'+92 303 888 0008',age:26,img:'https://images.unsplash.com/photo-1567532939604-b6b5b0db2604?w=80&h=80&fit=crop'},
  {id:9,name:'Faisal Qureshi',trade:'Electrician',city:'Multan',rating:4.6,orders:95,status:'verified',joined:'Jun 2025',cnic:'36302-9012345-9',phone:'+92 332 999 0009',age:35,img:'https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?w=80&h=80&fit=crop'},
  {id:10,name:'Hamza Siddiqui',trade:'Welder',city:'Karachi',rating:0,orders:0,status:'pending',joined:'Feb 2026',cnic:'42301-0123456-0',phone:'+92 344 000 0010',age:22,img:'https://images.unsplash.com/photo-1501196354995-cbb51c65aaea?w=80&h=80&fit=crop'},
  {id:11,name:'Sadia Imran',trade:'Tailor',city:'Lahore',rating:4.3,orders:52,status:'verified',joined:'Aug 2025',cnic:'35301-1234560-1',phone:'+92 307 111 0011',age:30,img:'https://images.unsplash.com/photo-1544005313-94ddf0286df2?w=80&h=80&fit=crop'},
  {id:12,name:'Nabeel Munir',trade:'AC Technician',city:'Lahore',rating:4.4,orders:78,status:'verified',joined:'Sep 2025',cnic:'35401-5678904-5',phone:'+92 331 555 0012',age:36,img:'https://images.unsplash.com/photo-1522075469751-3a6694fb2f61?w=80&h=80&fit=crop'},
];

/* Merge real worker sign-ups (from auth.html) into the admin table */
(function syncRealWorkers(){
  const real = JSON.parse(localStorage.getItem('allWorkers')||'[]');
  real.forEach(w=>{
    if (typeof w.id !== 'number' || w.id < 1000000000000) return; // skip demo/seed rows, only real sign-ups
    if (workers.some(x=>x.id===w.id)) return;
    let status = (w.status||'pending').toLowerCase();
    if (status==='reviewing docs') status='pending';
    if (status==='verified match') status='verified';
    workers.unshift({id:w.id,name:w.name,trade:w.skill||'General',city:w.city||'—',rating:HJ.getWorkerMeta(w.id).avgRating,orders:HJ.getWorkerMeta(w.id).completedJobs,status,joined:w.date||'—',cnic:w.cnic||'N/A',phone:w.phone||'N/A',age:'-',img:w.image||'https://ui-avatars.com/api/?name='+encodeURIComponent(w.name)+'&background=1b5e37&color=fff'});
  });
})();
function persistWorkerStatus(id,status){
  const real = JSON.parse(localStorage.getItem('allWorkers')||'[]');
  const w = real.find(x=>x.id===id);
  if(w){ w.status=status; localStorage.setItem('allWorkers', JSON.stringify(real)); }
}

let activeTab='all',page=1;const PER=8;
let selectedW=null;

function initStats(){
  HC.countUp(document.getElementById('sc-total'),workers.length);
  HC.countUp(document.getElementById('sc-ver'),workers.filter(w=>w.status==='verified').length);
  HC.countUp(document.getElementById('sc-pend'),workers.filter(w=>w.status==='pending').length);
  HC.countUp(document.getElementById('sc-susp'),workers.filter(w=>w.status==='suspended').length);
  const rw=workers.filter(w=>w.rating>0);
  const avg=rw.length?(rw.reduce((s,w)=>s+w.rating,0)/rw.length).toFixed(1):'—';
  setTimeout(()=>document.getElementById('sc-rate').textContent=avg,600);
}

function getFiltered(){
  const q=(document.getElementById('wSearch').value||'').toLowerCase();
  const tr=document.getElementById('tradeF').value;
  const st=document.getElementById('statusF').value;
  return workers.filter(w=>{
    if(activeTab!=='all'&&w.status!==activeTab)return false;
    if(st&&w.status!==st)return false;
    if(tr&&w.trade!==tr)return false;
    if(q&&!w.name.toLowerCase().includes(q)&&!w.city.toLowerCase().includes(q)&&!w.trade.toLowerCase().includes(q))return false;
    return true;
  });
}

function stars(r){
  if(!r)return'<span style="color:var(--faint);font-size:.7rem">No reviews</span>';
  return'<span class="stars">'+'★'.repeat(Math.round(r))+'☆'.repeat(5-Math.round(r))+'</span> <span style="font-size:.7rem;color:var(--faint)">'+r+'</span>';
}
const sMap={verified:'verified',pending:'pending',suspended:'suspended'};
const sLbl={verified:'✓ Verified',pending:'⏳ Pending',suspended:'🚫 Suspended'};
const avCls=['av0','av1','av2','av3','av4','av5'];

function renderTable(){
  const data=getFiltered();
  const total=data.length;
  const pages=Math.max(1,Math.ceil(total/PER));
  if(page>pages)page=pages;
  const start=(page-1)*PER;
  const slice=data.slice(start,start+PER);
  document.getElementById('wCount').textContent=`${total} worker${total!==1?'s':''} found`;
  document.getElementById('pgInfo').textContent=`Showing ${total?start+1:0}–${Math.min(start+PER,total)} of ${total}`;
  document.getElementById('wBody').innerHTML=slice.map((w,i)=>`
    <tr onclick="openDrawer(${w.id})" style="animation:rowIn .3s var(--e2) ${i*.04}s both">
      <td onclick="event.stopPropagation()"><input type="checkbox" class="rc" data-id="${w.id}" style="accent-color:var(--g1)"></td>
      <td><div style="display:flex;align-items:center;gap:.62rem">
        <img src="${w.img}" class="tbl-av" alt="${w.name}">
        <div><div style="font-weight:700;color:var(--ink);font-size:.82rem">${w.name}</div><div style="font-size:.64rem;color:var(--faint);font-family:var(--fi)">${w.phone}</div></div>
      </div></td>
      <td style="font-weight:600;color:var(--body)">${w.trade}</td>
      <td style="color:var(--body)"><i class="fas fa-location-dot" style="color:var(--g3);font-size:.62rem;margin-right:.28rem"></i>${w.city}</td>
      <td>${stars(w.rating)}</td>
      <td style="text-align:center;font-weight:700">${w.orders}</td>
      <td><span class="badge ${sMap[w.status]||'gray'}">${sLbl[w.status]||w.status}</span></td>
      <td style="color:var(--faint);font-size:.76rem;font-family:var(--fi)">${w.joined}</td>
      <td><div style="display:flex;gap:.3rem;justify-content:center" onclick="event.stopPropagation()">
        <button class="act-btn view" title="View" onclick="openDrawer(${w.id})"><i class="fas fa-eye"></i></button>
        ${w.status==='pending'?`<button class="act-btn ok" title="Approve" onclick="quickApprove(${w.id},'${w.name}')"><i class="fas fa-check"></i></button>`:''}
        ${w.status!=='suspended'?`<button class="act-btn warn" title="Suspend" onclick="quickSuspend(${w.id},'${w.name}')"><i class="fas fa-ban"></i></button>`:`<button class="act-btn ok" title="Reinstate" onclick="quickReinstate(${w.id},'${w.name}')"><i class="fas fa-unlock"></i></button>`}
        <button class="act-btn del" title="Delete" onclick="quickDelete(${w.id},'${w.name}')"><i class="fas fa-trash"></i></button>
      </div></td>
    </tr>`).join('')||`<tr><td colspan="9" style="text-align:center;padding:2.5rem;color:var(--faint);font-family:var(--fi)">No workers match your filters.</td></tr>`;
  // Pagination
  let pg='';
  pg+=`<button class="pg-btn" onclick="goPage(${page-1})" ${page<=1?'disabled':''}>‹</button>`;
  for(let i=1;i<=pages;i++){
    if(i===1||i===pages||Math.abs(i-page)<=1)pg+=`<button class="pg-btn ${i===page?'active':''}" onclick="goPage(${i})">${i}</button>`;
    else if(Math.abs(i-page)===2)pg+=`<span style="color:var(--faint);line-height:27px;font-size:.8rem">…</span>`;
  }
  pg+=`<button class="pg-btn" onclick="goPage(${page+1})" ${page>=pages?'disabled':''}>›</button>`;
  document.getElementById('pgBtns').innerHTML=pg;
  
  HC.applyGlobalSettings();
}
function goPage(p){page=p;renderTable();}
function setTab(t,el){document.querySelectorAll('#statusTabs .ftab').forEach(b=>b.classList.remove('active'));el.classList.add('active');activeTab=t;page=1;renderTable();}
function toggleAll(el){document.querySelectorAll('.rc').forEach(cb=>cb.checked=el.checked);}

function quickApprove(id,name){openModal({icon:'fas fa-user-check',title:'Approve Worker',body:`Approve ${name}?`,confirmText:'Approve',onConfirm:()=>{const w=workers.find(x=>x.id===id);if(w)w.status='verified';persistWorkerStatus(id,'verified');renderTable();initStats();HC.toast(`✓ ${name} approved!`,'success');}});}
function quickSuspend(id,name){openModal({icon:'fas fa-ban',iconType:'danger',title:'Suspend Worker',body:`Suspend ${name}?`,confirmText:'Suspend',danger:true,onConfirm:()=>{const w=workers.find(x=>x.id===id);if(w)w.status='suspended';persistWorkerStatus(id,'suspended');renderTable();initStats();HC.toast(`${name} suspended.`,'warning');}});}
function quickReinstate(id,name){const w=workers.find(x=>x.id===id);if(w)w.status='verified';persistWorkerStatus(id,'verified');renderTable();initStats();HC.toast(`${name} reinstated.`,'success');}
function quickDelete(id,name){openModal({icon:'fas fa-trash',iconType:'danger',title:'Delete Worker',body:`Permanently delete ${name}? Cannot be undone.`,confirmText:'Delete',danger:true,onConfirm:()=>{const i=workers.findIndex(x=>x.id===id);if(i>-1)workers.splice(i,1);renderTable();initStats();HC.toast(`${name} deleted.`,'warning');}});}

function openDrawer(id){
  selectedW=workers.find(w=>w.id===id);if(!selectedW)return;
  const w=selectedW;
  document.getElementById('dTitle').textContent=w.name;
  document.getElementById('dApprBtn').style.display=w.status==='pending'?'':'none';
  document.getElementById('dSuspBtn').textContent=w.status==='suspended'?'✓ Reinstate':'🚫 Suspend';
  document.getElementById('dBody').innerHTML=`
    <div style="background:linear-gradient(135deg,var(--g1),var(--g2));border-radius:13px;padding:1.1rem;color:#fff;margin-bottom:1rem;display:flex;align-items:center;gap:.9rem">
      <img src="${w.img}" style="width:52px;height:52px;border-radius:11px;object-fit:cover;border:2.5px solid rgba(255,255,255,.3)" alt="${w.name}">
      <div>
        <div style="font-family:var(--fd);font-size:1.05rem;font-weight:800">${w.name}</div>
        <div style="font-size:.73rem;opacity:.75;margin-top:.12rem">${w.trade} · ${w.city}</div>
        <span style="display:inline-block;margin-top:.38rem;background:rgba(255,255,255,.2);padding:.1rem .48rem;border-radius:100px;font-size:.63rem;font-weight:700">${sLbl[w.status]||w.status}</span>
      </div>
    </div>
    <div class="dr-sec-ttl" style="margin-bottom:.55rem">Personal Details</div>
    <div class="dr-info-grid">
      <div class="dr-info"><div class="dr-info-lbl">Phone</div><div class="dr-info-val" style="font-size:.72rem">${w.phone}</div></div>
      <div class="dr-info"><div class="dr-info-lbl">Age</div><div class="dr-info-val">${w.age} yrs</div></div>
      <div class="dr-info"><div class="dr-info-lbl">CNIC</div><div class="dr-info-val" style="font-size:.7rem">${w.cnic}</div></div>
      <div class="dr-info"><div class="dr-info-lbl">City</div><div class="dr-info-val">${w.city}</div></div>
      <div class="dr-info"><div class="dr-info-lbl">Joined</div><div class="dr-info-val">${w.joined}</div></div>
      <div class="dr-info"><div class="dr-info-lbl">Orders</div><div class="dr-info-val">${w.orders}</div></div>
    </div>
    <div class="dr-sec-ttl" style="margin:1rem 0 .5rem">Rating</div>
    <div style="font-size:.95rem">${stars(w.rating)}</div>
    <div class="dr-sec-ttl" style="margin:1rem 0 .5rem">Skills</div>
    <div><span class="skill-chip"><i class="fas fa-check" style="font-size:.58rem"></i>${w.trade}</span><span class="skill-chip">Residential</span></div>
    <div class="dr-sec-ttl" style="margin:1rem 0 .5rem">Activity Log</div>
    <div style="font-size:.75rem;color:var(--body);font-family:var(--fi);display:flex;flex-direction:column;gap:.4rem">
      <div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:.48rem .7rem">📝 Registered on Hunarmand — ${w.joined}</div>
      ${w.status==='verified'?'<div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:.48rem .7rem">✅ Identity verified by Admin</div>':''}
      ${w.orders>0?`<div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:.48rem .7rem">📦 ${w.orders} orders completed</div>`:''}
    </div>`;
  document.getElementById('dOverlay').classList.add('show');
  document.getElementById('wDrawer').classList.add('open');
  document.body.style.overflow='hidden';
  
  HC.applyGlobalSettings();
}
function closeDrawer(){
  document.getElementById('dOverlay').classList.remove('show');
  document.getElementById('wDrawer').classList.remove('open');
  document.body.style.overflow='';selectedW=null;
}
function drawerApprove(){if(!selectedW)return;const w=selectedW;openModal({icon:'fas fa-user-check',title:'Approve Worker',body:`Approve ${w.name}?`,confirmText:'Approve',onConfirm:()=>{w.status='verified';persistWorkerStatus(w.id,'verified');closeDrawer();renderTable();initStats();HC.toast(`✓ ${w.name} approved!`,'success');}});}
function drawerSuspend(){if(!selectedW)return;const w=selectedW;const s=w.status==='suspended';openModal({icon:'fas fa-ban',iconType:s?'':'danger',title:s?'Reinstate':'Suspend',body:`${s?'Reinstate':'Suspend'} ${w.name}?`,confirmText:s?'Reinstate':'Suspend',danger:!s,onConfirm:()=>{w.status=s?'verified':'suspended';persistWorkerStatus(w.id,w.status);closeDrawer();renderTable();initStats();HC.toast(`${w.name} ${s?'reinstated':'suspended'}.`,s?'success':'warning');}});}
function drawerMsg(){if(!selectedW)return;openModal({icon:'fas fa-comment',title:'Message Worker',body:`Send a message to ${selectedW.name}.`,formHTML:`<div class="modal-form"><div class="mf-field"><label class="mf-lbl">Message</label><textarea class="mf-input mf-ta" placeholder="Type your message..."></textarea></div></div>`,confirmText:'Send',onConfirm:()=>HC.toast(`Message sent to ${selectedW.name}.`,'success')});}

function openAddWorker(){openModal({icon:'fas fa-hard-hat',title:'Add Worker',body:'Worker receives an SMS after submission.',wide:true,formHTML:`<div class="modal-form"><div class="mf-row"><div class="mf-field"><label class="mf-lbl">Full Name</label><input class="mf-input" id="wna" placeholder="Ahmed Raza"></div><div class="mf-field"><label class="mf-lbl">Phone</label><input class="mf-input" id="wpa" placeholder="+92 3XX XXXXXXX"></div></div><div class="mf-row"><div class="mf-field"><label class="mf-lbl">Trade</label><select class="mf-sel" id="wta"><option value="">Select...</option><option>Electrician</option><option>Plumber</option><option>Carpenter</option><option>Painter</option><option>AC Technician</option><option>Welder</option><option>Tailor</option><option>Housecleaner</option><option>Mason</option></select></div><div class="mf-field"><label class="mf-lbl">City</label><select class="mf-sel" id="wca"><option value="">Select city...</option>${HJ.MAJOR_CITIES.map(c=>`<option>${c}</option>`).join('')}</select></div></div><div class="mf-field"><label class="mf-lbl">CNIC</label><input class="mf-input" placeholder="XXXXX-XXXXXXX-X" maxlength="15"></div></div>`,confirmText:'Add Worker',onConfirm:()=>{const n=document.getElementById('wna')?.value.trim(),t=document.getElementById('wta')?.value,c=document.getElementById('wca')?.value;if(!n||!t||!c){HC.toast('All fields required','warning');return;}if(!HJ.isRealisticName(n)){HC.toast('Enter a real full name, not random characters','warning');return;}workers.unshift({id:Date.now(),name:n,trade:t,city:c,rating:0,orders:0,status:'pending',joined:'Jun 2026',cnic:'N/A',phone:document.getElementById('wpa')?.value||'N/A',age:'-',img:'https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=80&h=80&fit=crop'});renderTable();initStats();HC.toast(`✓ Worker "${n}" added!`,'success');}});}
function bulkVerify(){const checked=[...document.querySelectorAll('.rc:checked')].map(c=>parseInt(c.dataset.id));if(!checked.length){HC.toast('Select workers first','warning');return;}openModal({icon:'fas fa-shield-check',title:'Bulk Verify',body:`Verify ${checked.length} selected worker(s)?`,confirmText:`Verify ${checked.length}`,onConfirm:()=>{checked.forEach(id=>{const w=workers.find(x=>x.id===id);if(w)w.status='verified';persistWorkerStatus(id,'verified');});renderTable();initStats();HC.toast(`✓ ${checked.length} workers verified.`,'success');}});}
function broadcastWorkers(){openModal({icon:'fas fa-bullhorn',iconType:'amber',title:'Message All Workers',body:'Send a notification to all active workers.',formHTML:`<div class="modal-form"><div class="mf-field"><label class="mf-lbl">Title</label><input class="mf-input" id="bwt" placeholder="Important Update"></div><div class="mf-field"><label class="mf-lbl">Message</label><textarea class="mf-input mf-ta" id="bwm" placeholder="Message body..."></textarea></div></div>`,confirmText:'Send',onConfirm:()=>{const t=document.getElementById('bwt')?.value.trim();if(!t){HC.toast('Title required','warning');return;}HC.toast(`📢 Message sent to all workers.`,'success');}});}
function exportCSV(){HC.exportCSV([['Name','Trade','City','Rating','Orders','Status','Joined'],...workers.map(w=>[w.name,w.trade,w.city,w.rating,w.orders,w.status,w.joined])],'hunarmand_workers.csv');}

document.addEventListener('DOMContentLoaded',()=>{renderTable();setTimeout(initStats,300);});
</script>
</body>
</html>
